<!DOCTYPE html>
<html>

<head>
    <title>Pricing Card</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #eef2f7;
        }

        .card {
            width: 320px;
            background: white;
            text-align: center;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
        }

        .card h2 {
            color: #2c3e50;
            margin-bottom: 10px;
        }

        .price {
            font-size: 38px;
            color: #3498db;
            font-weight: bold;
            margin: 20px 0;
        }

        ul {
            list-style: none;
            margin: 20px 0;
        }

        ul li {
            padding: 10px;
            border-bottom: 1px solid #ddd;
            color: #555;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #2c80b4;
        }
    </style>
</head>

<body>

    <div class="card">
        <h2>Basic Plan</h2>

        <div class="price">₹999/month</div>

        <ul>
            <li>✔ 10 TB Storage</li>
            <li>✔ Free Support</li>
            <li>✔ 10 Projects</li>
            <li>✔ Email Access</li>
        </ul>

        <button>Choose Plan</button>
    </div>

</body>

</html>
