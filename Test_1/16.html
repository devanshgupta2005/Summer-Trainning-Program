<!DOCTYPE html>
<html>

<head>
    <title>Navigation Bar</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f2f2f2;
        }

        nav {
            background: #df2b07;
            padding: 15px;
            text-align: center;
        }

        nav a {
            color: rgb(10, 10, 10);
            text-decoration: none;
            padding: 10px 18px;
            margin: 5px;
            background: #dcf005;
            border-radius: 5px;
        }

        nav a:hover {
            background: #f6b93b;
            color: black;
        }
    </style>
</head>

<body>

    <nav>
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Services</a>
        <a href="#">Contact</a>
    </nav>

</body>

</html>
