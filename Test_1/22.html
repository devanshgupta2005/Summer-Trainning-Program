<!DOCTYPE html>
<html>

<head>
    <title>Rotating Square Animation</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #c7ee04, #ea8109);
            font-family: Arial, sans-serif;
        }

        .box {
            width: 150px;
            height: 150px;
            background: linear-gradient(45deg, #6b6eff, #07cfee);
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
            animation: rotateBox 3s linear infinite;
        }

        @keyframes rotateBox {
            0% {
                transform: rotate(0deg);
            }

            50% {
                transform: rotate(180deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>

    <div class="box"></div>

</body>

</html>
